<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI Emergency Assistant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

header{
font-size:clamp(22px,5vw,32px);
padding:25px;
font-weight:bold;
}

/* BUTTONS */
.buttonContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
flex:1 1 30%;
min-width:120px;
}

.voice{background:#22c55e;}
.scan{background:#3b82f6;}
.rescue{background:#ef4444;}

video{
width:100%;
max-width:420px;
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
font-size:18px;
color:#38bdf8;
}

#result{
margin-top:10px;
font-size:22px;
}

#status{
margin-top:10px;
color:#facc15;
}

/* MAP */
#map{
width:100%;
height:350px;
margin:auto;
margin-top:40px;
border-radius:12px;
}

/* FIRST AID */
.firstAidContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.firstAidCard{
position:relative;
background:linear-gradient(145deg,#16a34a,#22c55e);
border-radius:14px;
padding:20px;
width:90%;
max-width:260px;
text-align:left;
box-shadow:0 0 12px rgba(34,197,94,0.3);
overflow:hidden;
}

.firstAidCard h4{
margin-bottom:10px;
}

.firstAidCard p{
font-size:14px;
}

/* JARVIS */
#jarvis{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
border-top:2px solid #22c55e;
transition:0.3s;
}

#jarvis.hidden{
transform:translateY(100%);
}

#jarvisHeader{
padding:10px;
background:#022c22;
color:#4ade80;
font-weight:bold;
}

#jarvisChat{
max-height:150px;
overflow-y:auto;
padding:10px;
text-align:left;
}

.jarvisMsg{
margin:6px 0;
padding:8px;
border-radius:10px;
background:#111827;
}

.jarvisUser{
background:#1d4ed8;
}

#jarvisControls{
display:flex;
gap:10px;
padding:10px;
}

#jarvisControls button{
flex:1;
background:#22c55e;
color:black;
}

/* TOGGLE BUTTON */
#toggleJarvis{
position:fixed;
bottom:160px;
right:10px;
background:#22c55e;
border:none;
padding:10px;
border-radius:50%;
font-size:18px;
cursor:pointer;
z-index:1000;
}
</style>
</head>

<body>

<header>MedAI Emergency Assistant</header>
<p>Voice Activated • AI Injury Detection • Smart Rescue</p>

<div class="buttonContainer">
<button class="voice" onclick="startVoice()">🎤 Voice</button>
<button class="scan" onclick="startScan()">📷 Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Ambulance</button>
</div>

<div id="status">Loading AI...</div>

<video id="camera" autoplay playsinline></video>

<div id="heard">Voice: Off</div>
<div id="result"></div>

<h2>First Aid Instructions</h2>
<div id="firstAid" class="firstAidContainer"></div>

<h2>Emergency Map</h2>
<div id="map"></div>

<!-- TOGGLE BUTTON -->
<button id="toggleJarvis" onclick="toggleJarvis()">🤖</button>

<!-- JARVIS -->
<div id="jarvis">
<div id="jarvisHeader">MedAI Assistant</div>
<div id="jarvisChat"></div>
<div id="jarvisControls">
<button onclick="jarvisScan()">Scan</button>
<button onclick="jarvisHelp()">Help</button>
</div>
</div>

<script>

/* SPEECH UNLOCK */
document.body.addEventListener("click",()=>{
speechSynthesis.speak(new SpeechSynthesisUtterance(""));
},{once:true});

function speak(text){
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* FULL FIRST AID */
const firstAidInstructions={
bruise:[
"Apply cold compress immediately",
"Rest the injured area",
"Elevate if possible",
"Avoid pressure on bruise"
],
cut:[
"Clean wound with water",
"Apply antiseptic",
"Stop bleeding with pressure",
"Cover with sterile bandage"
],
burn:[
"Cool under running water",
"Do not apply ice",
"Cover with clean cloth",
"Avoid popping blisters"
],
sprain:[
"Rest the joint",
"Apply ice pack",
"Compress with bandage",
"Elevate limb"
],
fracture:[
"Immobilize area",
"Do not move patient",
"Apply splint if trained",
"Seek medical help immediately"
],
abrasion:[
"Clean wound gently",
"Apply antiseptic ointment",
"Cover with bandage",
"Change dressing regularly"
]
};

/* MODEL */
let model;
let modelReady=false;
const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";

async function loadModel(){
model=await tmImage.load(MODEL_URL+"model.json",MODEL_URL+"metadata.json");
modelReady=true;
document.getElementById("status").innerText="AI Ready";
}
loadModel();

/* CAMERA */
const video=document.getElementById("camera");

async function startScan(){
if(!modelReady)return alert("Model loading");

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

video.onloadeddata=()=>setTimeout(predict,1500);
}

/* PREDICT */
async function predict(){
const pred=await model.predict(video);
let best=pred.reduce((a,b)=>a.probability>b.probability?a:b);

document.getElementById("result").innerText=
best.className+" ("+(best.probability*100).toFixed(1)+"%)";

speak(best.className);

showFirstAid(best.className.toLowerCase());
addJarvisMessage("Detected: "+best.className);
}

/* FIRST AID DISPLAY */
function showFirstAid(type){
const div=document.getElementById("firstAid");
div.innerHTML="";

(firstAidInstructions[type]||["No data"]).forEach(step=>{
const card=document.createElement("div");
card.className="firstAidCard";
card.innerHTML="<h4>"+type+"</h4><p>"+step+"</p>";
div.appendChild(card);
});
}

/* VOICE */
let recognition;
function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported");
return;
}

recognition=new webkitSpeechRecognition();
recognition.continuous=true;
recognition.start();

recognition.onresult=(e)=>{
let t=e.results[e.results.length-1][0].transcript.toLowerCase();
addJarvisMessage(t,true);

if(t.includes("scan")) startScan();
if(t.includes("ambulance")) dispatchRescue();
};
}

/* MAP */
let map,userMarker;

function initMap(lat,lon){
map=L.map('map').setView([lat,lon],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
userMarker=L.marker([lat,lon]).addTo(map);
}

navigator.geolocation.getCurrentPosition(
pos=>initMap(pos.coords.latitude,pos.coords.longitude),
()=>initMap(28.6139,77.2090)
);

/* AMBULANCE */
function dispatchRescue(){
if(!map)return;
speak("Ambulance coming");
addJarvisMessage("Ambulance dispatched");
}

/* JARVIS */
function addJarvisMessage(text,user=false){
const chat=document.getElementById("jarvisChat");
const msg=document.createElement("div");
msg.className="jarvisMsg"+(user?" jarvisUser":"");
msg.innerText=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function jarvisScan(){
addJarvisMessage("Scan requested",true);
startScan();
}

function jarvisHelp(){
addJarvisMessage("Help requested",true);
dispatchRescue();
}

function toggleJarvis(){
document.getElementById("jarvis").classList.toggle("hidden");
}

window.onload=()=>{
addJarvisMessage("Hello, I am MedAI Assistant");
addJarvisMessage("Use Scan or Help");
};

</script>

</body>
</html>
