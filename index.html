<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI Emergency Assistant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
font-size:32px;
padding:25px;
font-weight:bold;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

video{
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
font-size:18px;
color:#38bdf8;
}

#result{
margin-top:10px;
font-size:22px;
}

#map{
width:90%;
height:450px;
margin:auto;
margin-top:40px;
border-radius:12px;
}

</style>
</head>

<body>

<header>MedAI Emergency Assistant</header>

<p>Voice Activated • AI Injury Detection • Smart Rescue</p>

<button class="voice" onclick="startVoice()">🎤 Start Voice Assistant</button>
<button class="scan" onclick="startScan()">📷 Scan Injury</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Send Ambulance</button>

<br>

<video id="camera" width="320" height="240" autoplay></video>

<div id="heard">Voice: Off</div>
<div id="result"></div>

<h2>Emergency Map</h2>

<div id="map"></div>

<script>

/* TEXT TO SPEECH */

function speak(text){
const speech=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(speech);
}

/* LOAD YOUR MODEL */

let model;

const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";

async function loadModel(){

const modelURL = MODEL_URL + "model.json";
const metadataURL = MODEL_URL + "metadata.json";

model = await tmImage.load(modelURL, metadataURL);

}

loadModel();

/* CAMERA */

async function startScan(){

const video=document.getElementById("camera");

const stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

setTimeout(predict,2000);

}

/* AI PREDICTION */

async function predict(){

const video=document.getElementById("camera");

const prediction=await model.predict(video);

let best=prediction[0];

for(let i=1;i<prediction.length;i++){
if(prediction[i].probability>best.probability){
best=prediction[i];
}
}

document.getElementById("result").innerHTML =
best.className + " (" + (best.probability*100).toFixed(1) + "%)";

speak(best.className + " detected");

}

/* VOICE COMMANDS */

let recognition;

async function startVoice(){

const stream = await navigator.mediaDevices.getUserMedia({audio:true});
stream.getTracks().forEach(track => track.stop());

recognition=new webkitSpeechRecognition();

recognition.continuous=true;
recognition.lang="en-US";

recognition.start();

document.getElementById("heard").innerHTML="Listening...";

recognition.onresult=function(event){

let speech=event.results[event.results.length-1][0].transcript.toLowerCase();

document.getElementById("heard").innerHTML="Heard: "+speech;

if(speech.includes("scan")){
startScan();
}

if(speech.includes("help") || speech.includes("ambulance")){
dispatchRescue();
}

};

recognition.onend=function(){
recognition.start();
};

}

/* MAP */

let map;
let userMarker;
let ambulanceMarker;
let routeLine;

/* BIG AMBULANCE ICON */

const ambulanceIcon=L.divIcon({
html:"🚑",
className:"",
iconSize:[100,100]
});

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("Patient Location")
.openPopup();

});

/* ROUTING */

async function dispatchRescue(){

if(!userMarker) return;

const user=userMarker.getLatLng();

/* ambulance start location */

const startLat=user.lat+0.02;
const startLng=user.lng-0.02;

const routeURL =
`https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${user.lng},${user.lat}?overview=full&geometries=geojson`;

const response=await fetch(routeURL);
const data=await response.json();

const coords=data.routes[0].geometry.coordinates;

const route=coords.map(c=>[c[1],c[0]]);

/* draw road route */

routeLine=L.polyline(route,{color:"red"}).addTo(map);

/* ambulance marker */

ambulanceMarker=L.marker(route[0],{icon:ambulanceIcon}).addTo(map);

/* move ambulance */

moveAmbulance(route);

}

function moveAmbulance(route){

let i=0;

const interval=setInterval(()=>{

ambulanceMarker.setLatLng(route[i]);

i++;

if(i>=route.length){

clearInterval(interval);

speak("Ambulance has arrived");

}

},200);

}

</script>

</body>
</html>
