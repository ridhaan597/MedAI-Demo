<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAI Demo</title>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    font-size:42px;
    padding:35px;
    font-weight:bold;
}

button{
    padding:12px 22px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

video{
    width:320px;
    border-radius:15px;
    margin-top:20px;
}

#scanResult{
    margin-top:20px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
}

/* MAP */

.map{
    width:750px;
    height:420px;
    margin:auto;
    margin-top:40px;
    border-radius:20px;
    background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
    background-size:cover;
    position:relative;
    overflow:hidden;
}

#user{
    position:absolute;
    top:65%;
    left:60%;
    font-size:26px;
}

#ambulance{
    position:absolute;
    top:10%;
    left:10%;
    font-size:26px;
}

/* NETWORK PHONES */

.phone{
    position:absolute;
    font-size:18px;
    opacity:0.9;
}

.connection{
    position:absolute;
    height:2px;
    background:#38bdf8;
    transform-origin:left center;
}

</style>
</head>

<body>

<header>MedAI AI Emergency Assistant</header>

<p>Voice Activated • AI Injury Detection • Smart Rescue System</p>

<button class="voice" onclick="startWakeWord()">🎤 Start Voice</button>
<button class="scan" onclick="initCamera()">Open Scanner</button>
<button class="scan" onclick="predict()">Run AI Scan</button>

<div>
<video id="webcam" autoplay playsinline></video>
<div id="scanResult"></div>
</div>

<h2>Emergency Response Map</h2>

<button class="rescue" onclick="dispatchRescue()">🚑 Dispatch Rescue Team</button>

<div class="map" id="map">

<div id="user">📍</div>
<div id="ambulance">🚑</div>

<!-- network phones -->
<div class="phone" style="top:30%;left:20%">📱</div>
<div class="phone" style="top:50%;left:40%">📱</div>
<div class="phone" style="top:25%;left:70%">📱</div>
<div class="phone" style="top:70%;left:25%">📱</div>

</div>

<script>

let model, webcam;

/* LOAD MODEL */

const URL="https://teachablemachine.withgoogle.com/models/L3S9i1V7D/";

async function loadModel(){
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";
    model = await tmImage.load(modelURL, metadataURL);
}

loadModel();

/* CAMERA */

async function initCamera(){

webcam = new tmImage.Webcam(320,320,true);

await webcam.setup();
await webcam.play();

document.getElementById("webcam").replaceWith(webcam.canvas);

window.requestAnimationFrame(loop);

}

async function loop(){
webcam.update();
requestAnimationFrame(loop);
}

/* AI PREDICTION */

async function predict(){

if(!model || !webcam) return;

const prediction = await model.predict(webcam.canvas);

let html="";

prediction.forEach(p => {

let percent=(p.probability*100).toFixed(1);

html+=`
<div style="margin:8px 0;text-align:left">
<b>${p.className}</b>
<div style="background:#1e293b;border-radius:10px;height:14px;">
<div style="width:${percent}%;background:#38bdf8;height:14px;border-radius:10px"></div>
</div>
${percent}%
</div>
`;

});

document.getElementById("scanResult").innerHTML=html;

}

/* WAKE WORD */

function startWakeWord(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice recognition not supported in this browser");
return;
}

const recognition = new SpeechRecognition();
recognition.continuous = true;
recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

let speech = event.results[event.results.length-1][0].transcript.toLowerCase();

if(speech.includes("med ai scan") || speech.includes("medai scan")){

initCamera();

setTimeout(()=>predict(),2000);

}

}

alert("Listening for wake word: 'MedAI scan'");

}

/* RESCUE SYSTEM */

function dispatchRescue(){

alert("Emergency detected. Dispatching ambulance.");

moveAmbulance();

}

function moveAmbulance(){

let amb=document.getElementById("ambulance");

let x=10;
let y=10;

let interval=setInterval(()=>{

x+=1.5;
y+=1.2;

amb.style.left=x+"%";
amb.style.top=y+"%";

if(x>=60){

clearInterval(interval);

alert("🚑 Ambulance has reached the patient");

}

},200);

}

/* INACTIVITY CHECK */

let timer;

function resetTimer(){

clearTimeout(timer);

timer=setTimeout(()=>{

if(confirm("No activity detected. Need emergency help?")){

dispatchRescue();

}

},60000);

}

document.onmousemove=resetTimer;
document.onkeypress=resetTimer;

resetTimer();

/* NETWORK CONNECTION ANIMATION */

const phones=document.querySelectorAll(".phone");
const user=document.getElementById("user");
const map=document.getElementById("map");

phones.forEach(phone=>{

let line=document.createElement("div");
line.className="connection";

let px=phone.offsetLeft;
let py=phone.offsetTop;

let ux=user.offsetLeft;
let uy=user.offsetTop;

let dx=ux-px;
let dy=uy-py;

let length=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

line.style.width=length+"px";
line.style.left=px+"px";
line.style.top=py+"px";
line.style.transform=`rotate(${angle}deg)`;

map.appendChild(line);

});

</script>

</body>
</html>
