<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI Emergency Demo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.phone{
width:360px;
height:700px;
background:#020617;
border-radius:30px;
padding:20px;
box-shadow:0 0 30px black;
overflow:auto;
}

h1{
text-align:center;
color:#22c55e;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.scan{background:#22c55e;color:white;}
.voice{background:#38bdf8;color:white;}
.rescue{background:#ef4444;color:white;}

video{
width:100%;
border-radius:10px;
margin-top:10px;
}

#map{
height:250px;
margin-top:10px;
border-radius:10px;
}

.status{
margin-top:10px;
text-align:center;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="phone">

<h1>MedAI</h1>

<p style="text-align:center">AI Emergency Assistant</p>

<button class="scan" onclick="startScan()">AI Injury Scan</button>

<video id="camera" autoplay></video>

<button class="voice" onclick="startVoice()">Activate Voice Help</button>

<button class="rescue" onclick="callRescue()">Emergency Rescue</button>

<div id="map"></div>

<div class="status" id="status">Status: Waiting</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let userLat
let userLng
let rescueMarker

// CAMERA

async function startScan(){

document.getElementById("status").innerText="Scanning with AI..."

let stream=await navigator.mediaDevices.getUserMedia({video:true})

document.getElementById("camera").srcObject=stream

setTimeout(()=>{

let injuries=["Minor Cut Detected","Possible Fracture","Bruising Detected","No Injury Found"]

let result=injuries[Math.floor(Math.random()*injuries.length)]

document.getElementById("status").innerText="AI Result: "+result

},3000)

}

// VOICE ACTIVATION

function startVoice(){

let SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition

let recognition=new SpeechRecognition()

recognition.continuous=true
recognition.lang="en-US"

recognition.onresult=function(event){

let speech=event.results[event.results.length-1][0].transcript.toLowerCase()

if(speech.includes("help") || speech.includes("medai")){

callRescue()

}

}

recognition.start()

document.getElementById("status").innerText="Voice listening..."

}

// MAP

let map=L.map('map').setView([20,0],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

navigator.geolocation.getCurrentPosition(position=>{

userLat=position.coords.latitude
userLng=position.coords.longitude

map.setView([userLat,userLng],13)

L.marker([userLat,userLng]).addTo(map).bindPopup("Your Location")

})

// RESCUE TEAM

function callRescue(){

document.getElementById("status").innerText="Rescue team dispatched..."

let startLat=userLat+0.05
let startLng=userLng+0.05

rescueMarker=L.marker([startLat,startLng]).addTo(map).bindPopup("Rescue Team")

let step=0

let interval=setInterval(()=>{

startLat-=0.002
startLng-=0.002

rescueMarker.setLatLng([startLat,startLng])

step++

if(step>25){

clearInterval(interval)

document.getElementById("status").innerText="Rescue team has arrived"

}

},500)

}

// INACTIVITY DETECTION

let inactiveTime=0

setInterval(()=>{

inactiveTime++

if(inactiveTime>30){

callRescue()

}

},1000)

document.onmousemove=()=>inactiveTime=0
document.onkeypress=()=>inactiveTime=0

</script>

</body>
</html>
