<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI AI Emergency Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
font-size:36px;
padding:25px;
font-weight:bold;
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:16px;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

video{
border-radius:15px;
margin-top:20px;
}

#scanPanel{
margin-top:20px;
width:320px;
margin-left:auto;
margin-right:auto;
}

#map{
width:90%;
height:420px;
margin:auto;
margin-top:40px;
border-radius:15px;
}

</style>
</head>

<body>

<header>MedAI AI Emergency Assistant</header>

<p>Voice Activated • AI Injury Detection • Smart Rescue System</p>

<button class="voice" onclick="startVoice()">🎤 Start Voice Assistant</button>
<button class="scan" onclick="initCamera()">Open Scanner</button>
<button class="scan" onclick="predict()">Run AI Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Dispatch Rescue</button>

<br>

<video id="webcam" width="320" height="320" autoplay></video>

<div id="scanPanel"></div>

<h2>Emergency Response Map</h2>

<div id="map"></div>

<script>

/* TEXT TO SPEECH */

function speak(text){
const speech=new SpeechSynthesisUtterance(text);
speech.rate=1;
speech.pitch=1;
speechSynthesis.speak(speech);
}

/* LOAD AI MODEL */

let model;

const URL="https://teachablemachine.withgoogle.com/models/L3S9i1V7D/";

async function loadModel(){

const modelURL=URL+"model.json";
const metadataURL=URL+"metadata.json";

model=await tmImage.load(modelURL,metadataURL);

}

loadModel();

/* CAMERA */

async function initCamera(){

const video=document.getElementById("webcam");

const stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

}

/* AI SCAN */

async function predict(){

if(!model) return;

const video=document.getElementById("webcam");

const prediction=await model.predict(video);

let best=prediction[0];

prediction.forEach(p=>{
if(p.probability>best.probability) best=p;
});

document.getElementById("scanPanel").innerHTML=
"<h3>Detected: "+best.className+"</h3>"+
"<p>Probability: "+(best.probability*100).toFixed(1)+"%</p>";

speak("Injury detected: "+best.className);

}

/* VOICE SYSTEM */

let recognition;

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Google Chrome for voice commands");
return;
}

recognition = new SpeechRecognition();

recognition.continuous=true;
recognition.interimResults=false;
recognition.lang="en-US";

recognition.start();

recognition.onresult=function(event){

let speech=event.results[event.results.length-1][0].transcript.toLowerCase();

console.log("Heard:",speech);

if(speech.includes("med ai scan") || speech.includes("medai scan")){

speak("Scanning injury now");

initCamera();

setTimeout(()=>predict(),2000);

}

if(speech.includes("med ai help") || speech.includes("medai help")){

speak("Emergency services dispatched");

dispatchRescue();

}

};

recognition.onend=function(){

/* restart listening */

recognition.start();

};

speak("Voice assistant activated");

}

/* MAP */

let map;
let userMarker;
let ambulanceMarker;

const ambulanceIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/2967/2967350.png",
iconSize:[40,40]
});

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("Patient Location")
.openPopup();

});

/* RESCUE */

function dispatchRescue(){

if(!userMarker) return;

const userLoc=userMarker.getLatLng();

const start=[userLoc.lat+0.01,userLoc.lng-0.01];

ambulanceMarker=L.marker(start,{icon:ambulanceIcon}).addTo(map)
.bindPopup("Ambulance");

moveAmbulance(start,userLoc);

}

function moveAmbulance(start,end){

let lat=start[0];
let lng=start[1];

const interval=setInterval(()=>{

lat+=(end.lat-lat)*0.1;
lng+=(end.lng-lng)*0.1;

ambulanceMarker.setLatLng([lat,lng]);

if(Math.abs(lat-end.lat)<0.0001){

clearInterval(interval);

speak("Ambulance has arrived");

}

},500);

}

</script>

</body>
</html>
