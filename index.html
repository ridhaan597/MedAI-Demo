<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI Emergency Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0}

/* disclaimer */
#topDisclaimer{
background:#020617;
padding:12px;
border-bottom:2px solid #22c55e;
}

/* header */
header{font-size:28px;padding:20px}

/* buttons */
button{padding:12px 18px;margin:8px;border:none;border-radius:20px;cursor:pointer}
.voice{background:#22c55e}
.scan{background:#3b82f6}
.rescue{background:#ef4444}

/* lang */
#langToggle{
position:fixed;top:15px;right:15px;z-index:100000;
background:#22c55e;color:black;padding:8px 14px;border-radius:20px;
}

/* camera */
#cameraWrapper{position:relative}
video{width:90%;max-width:400px;border-radius:12px}
#flipBtn{
position:absolute;bottom:10px;right:10px;
background:rgba(0,0,0,0.6);color:white;border-radius:20px;padding:8px;display:none;
}

/* map */
#map{height:350px;margin-top:20px}

/* 🩹 first aid */
#firstAid{margin-top:15px}

/* jarvis */
#jarvis{
position:fixed;bottom:0;width:100%;
background:#020617;z-index:9999;
}
#jarvis.hidden{display:none}
#toggleJarvis{
position:fixed;bottom:120px;right:10px;z-index:10000;
}

/* inactivity */
#inactiveModal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;justify-content:center;align-items:center;
z-index:99999;
}
</style>
</head>

<body>

<div id="topDisclaimer">
⚠️ MedAI is made by class 10 students. This is first aid guidance only, not medical diagnosis.
</div>

<button id="langToggle">🌐 हिंदी</button>

<header>MedAI Emergency Assistant</header>

<button class="voice" onclick="startVoice()">🎤 Voice</button>
<button class="scan" onclick="startScan()">📷 Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Ambulance</button>

<div id="cameraWrapper">
<video id="camera" autoplay playsinline></video>
<button id="flipBtn">🔄 Flip</button>
</div>

<div id="heard"></div>
<div id="result"></div>
<div id="aiWarning"></div>

<!-- 🩹 FIRST AID -->
<div id="firstAid"></div>

<h2>Map</h2>
<div id="map"></div>

<button id="toggleJarvis" onclick="toggleJarvis()">🤖</button>

<div id="jarvis" class="hidden">
<div>Assistant</div>
<button onclick="startScan()">Scan</button>
<button onclick="dispatchRescue()">Help</button>
</div>

<!-- inactivity -->
<div id="inactiveModal">
<div style="background:#020617;padding:20px;border-radius:12px;">
<h2>Need Help?</h2>
<p id="inactiveTimer">60</p>
<button id="yesHelp">Yes</button>
<button id="noHelp">No</button>
</div>
</div>

<script>

/* 🩹 FIRST AID DATA */
const firstAidData={
bruise:["Apply ice","Rest area","Elevate limb"],
cut:["Clean wound","Apply antiseptic","Bandage"],
burn:["Cool with water","Do not apply ice","Cover lightly"],
sprain:["Rest","Ice","Compression","Elevation"]
};

/* LANGUAGE */
let currentLang="en";
const TEXTS={
en:{title:"MedAI Emergency Assistant",yes:"Yes",no:"No",warn:"⚠️ AI can make mistakes",arrived:"Ambulance has arrived"},
hi:{title:"मेडएआई सहायक",yes:"हाँ",no:"नहीं",warn:"⚠️ AI गलती कर सकता है",arrived:"एम्बुलेंस पहुँच गई है"}
};

document.getElementById("langToggle").onclick=()=>{
currentLang=currentLang==="en"?"hi":"en";
document.querySelector("header").innerText=TEXTS[currentLang].title;
};

/* SPEAK */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang=currentLang==="hi"?"hi-IN":"en-US";
speechSynthesis.speak(s);
}

/* MODEL */
let model;
const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";
tmImage.load(MODEL_URL+"model.json",MODEL_URL+"metadata.json").then(m=>model=m);

/* CAMERA */
let video=document.getElementById("camera");
let facing="environment";

async function startScan(){
const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing}});
video.srcObject=stream;
setTimeout(predict,1500);
}

/* AI */
async function predict(){
const p=await model.predict(video);
let best=p.reduce((a,b)=>a.probability>b.probability?a:b);

document.getElementById("result").innerHTML=
best.className+" ("+(best.probability*100).toFixed(1)+"%)";

document.getElementById("aiWarning").innerText=TEXTS[currentLang].warn;

/* 🩹 SHOW FIRST AID */
let steps=firstAidData[best.className.toLowerCase()]||["No data"];
let container = document.getElementById("firstAid");
container.innerHTML = "<h3>First Aid</h3>";

steps.forEach(step=>{
let card = document.createElement("div");
card.className="aidCard";
card.innerText=step;
container.appendChild(card);
});
/* 🩹 FIRST AID CARDS */
.aidCard{
background:linear-gradient(145deg,#16a34a,#22c55e);
padding:15px;
margin:10px auto;
max-width:260px;
border-radius:12px;
box-shadow:0 0 10px rgba(34,197,94,0.3);
transition:0.3s;
position:relative;
overflow:hidden;
}

.aidCard:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(34,197,94,0.8);
}

/* shine effect */
.aidCard::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
transition:0.5s;
}

.aidCard:hover::after{
left:100%;
}

speak(best.className);
}

/* VOICE */
function startVoice(){
let r=new webkitSpeechRecognition();
r.start();
r.onresult=e=>{
let t=e.results[0][0].transcript.toLowerCase();
document.getElementById("heard").innerText=t;
if(t.includes("scan")) startScan();
if(t.includes("help")) dispatchRescue();
};
}

/* 📍 MAP FIXED (REAL LOCATION) */
let map=L.map('map').setView([28.6,77.2],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker;

navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

map.setView([lat,lng],15);
userMarker=L.marker([lat,lng]).addTo(map);

},()=>{
userMarker=L.marker([28.6,77.2]).addTo(map);
});

let ambulanceMarker;

async function dispatchRescue(){

if(!userMarker) return;

let user = userMarker.getLatLng();

/* start farther away */
let start=[user.lat+0.03,user.lng-0.03];

/* remove old */
if(ambulanceMarker) map.removeLayer(ambulanceMarker);

/* ambulance icon */
ambulanceMarker = L.marker(start,{
icon:L.divIcon({html:"🚑",className:"",iconSize:[30,30]})
}).addTo(map);

speak("Ambulance is on the way");

/* 🚨 get REAL ROAD ROUTE */
let route=[];

try{
let res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${user.lng},${user.lat}?overview=full&geometries=geojson`);
let data = await res.json();

route = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
}catch(e){
console.log("Fallback route");

/* fallback smooth curve */
let steps=150;
for(let i=0;i<=steps;i++){
route.push([
start[0]+(user.lat-start[0])*(i/steps),
start[1]+(user.lng-start[1])*(i/steps)
]);
}
}

/* 🚑 move smoothly */
let i=0;
let move=setInterval(()=>{

if(i >= route.length){
clearInterval(move);

/* ✅ FIXED ARRIVAL */
setTimeout(()=>{
speak(TEXTS[currentLang].arrived);
},500);

return;
}

ambulanceMarker.setLatLng(route[i]);
i++;

},120);
}
/* JARVIS */
function toggleJarvis(){
document.getElementById("jarvis").classList.toggle("hidden");
}

/* INACTIVITY */
let timer,count=60;

function resetInactivity(){
clearTimeout(timer);
timer=setTimeout(showPopup,30000);
}

document.onclick=resetInactivity;
document.onmousemove=resetInactivity;

function showPopup(){
document.getElementById("inactiveModal").style.display="flex";

count=60;
let i=setInterval(()=>{
count--;
document.getElementById("inactiveTimer").innerText=count;

if(count<=0){
clearInterval(i);
dispatchRescue();
}
},1000);
}

document.getElementById("yesHelp").onclick=()=>{
dispatchRescue();
document.getElementById("inactiveModal").style.display="none";
};

document.getElementById("noHelp").onclick=()=>{
document.getElementById("inactiveModal").style.display="none";
};

resetInactivity();

</script>

</body>
</html>
