<!DOCTYPE html>
<html>
<head>

<title>MedAI Emergency AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
font-size:34px;
padding:25px;
font-weight:bold;
}

button{
padding:14px 22px;
margin:10px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

video{
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
color:#38bdf8;
font-size:18px;
}

#result{
margin-top:10px;
font-size:20px;
}

#map{
width:90%;
height:420px;
margin:auto;
margin-top:40px;
border-radius:12px;
}

</style>

</head>

<body>

<header>MedAI Emergency Assistant</header>

<p>AI Injury Detection • Voice Activated Rescue</p>

<button class="voice" onclick="startVoice()">🎤 Start Voice Assistant</button>
<button class="scan" onclick="startScan()">📷 Scan Injury</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Send Ambulance</button>

<br>

<video id="camera" width="320" height="240" autoplay muted></video>

<div id="heard">Voice status: Off</div>

<div id="result"></div>

<h2>Emergency Map</h2>

<div id="map"></div>

<script>

/* SPEAK FUNCTION */

function speak(text){

const speech=new SpeechSynthesisUtterance(text);

speech.volume=1;
speech.rate=1;
speech.pitch=1;

window.speechSynthesis.speak(speech);

}

/* CAMERA */

async function startScan(){

try{

const video=document.getElementById("camera");

const stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

setTimeout(fakeAI,2000);

}catch(e){

alert("Camera permission required");

}

}

/* FAKE AI MODEL (DEMO) */

function fakeAI(){

const injuries=["Minor Cut","Bruise","Burn","No Injury"];

const result=injuries[Math.floor(Math.random()*injuries.length)];

document.getElementById("result").innerHTML="Detected: "+result;

speak("Scan complete. "+result+" detected.");

}

/* VOICE SYSTEM */

let recognition;

async function startVoice(){

try{

/* request microphone permission */

await navigator.mediaDevices.getUserMedia({audio:true});

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

recognition=new SpeechRecognition();

recognition.continuous=true;

recognition.interimResults=false;

recognition.lang="en-US";

recognition.start();

document.getElementById("heard").innerHTML="Voice Assistant Listening...";

recognition.onresult=function(event){

let speech=event.results[event.results.length-1][0].transcript.toLowerCase();

document.getElementById("heard").innerHTML="Heard: "+speech;

if(speech.includes("med ai scan") || speech.includes("medai scan")){

speak("Starting scan");

startScan();

}

if(speech.includes("med ai help") || speech.includes("medai help")){

speak("Sending ambulance");

dispatchRescue();

}

};

recognition.onend=function(){

recognition.start();

};

speak("Voice assistant activated");

}catch(e){

alert("Microphone not available");

}

}

/* MAP */

let map;
let userMarker;
let ambulanceMarker;

const ambulanceIcon=L.divIcon({
html:"🚑",
className:"",
iconSize:[40,40]
});

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("Patient Location")
.openPopup();

});

/* AMBULANCE */

function dispatchRescue(){

if(!userMarker)return;

const user=userMarker.getLatLng();

const start=[user.lat+0.01,user.lng-0.01];

ambulanceMarker=L.marker(start,{icon:ambulanceIcon}).addTo(map);

moveAmbulance(start,user);

}

function moveAmbulance(start,end){

let lat=start[0];
let lng=start[1];

const interval=setInterval(()=>{

lat+=(end.lat-lat)*0.1;
lng+=(end.lng-lng)*0.1;

ambulanceMarker.setLatLng([lat,lng]);

if(Math.abs(lat-end.lat)<0.0001){

clearInterval(interval);

speak("Ambulance has arrived");

}

},500);

}

</script>

</body>
</html>
