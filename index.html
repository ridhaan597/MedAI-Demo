<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI Emergency Assistant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

header{
font-size:clamp(22px,5vw,32px);
padding:25px;
font-weight:bold;
}

/* BUTTONS */
.buttonContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
flex:1 1 30%;
min-width:120px;
}

.voice{background:#22c55e;}
.scan{background:#3b82f6;}
.rescue{background:#ef4444;}

video{
width:100%;
max-width:420px;
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
font-size:18px;
color:#38bdf8;
}

#result{
margin-top:10px;
font-size:22px;
}

/* MAP */
#map{
width:100%;
height:350px;
margin-top:40px;
border-radius:12px;
}

/* FIRST AID */
.firstAidContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.firstAidCard{
position:relative;
background:linear-gradient(145deg,#16a34a,#22c55e);
border-radius:14px;
padding:20px;
width:90%;
max-width:260px;
box-shadow:0 0 12px rgba(34,197,94,0.3);
overflow:hidden;
transition:0.3s;
}

.firstAidCard:hover{
transform:scale(1.05);
}

.firstAidCard::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.5s;
}

.firstAidCard:hover::after{
left:100%;
}

/* JARVIS */
#jarvis{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
border-top:2px solid #22c55e;
z-index:9999;
transition:0.3s;
}

#jarvis.hidden{
transform:translateY(100%);
}

#jarvisHeader{
padding:10px;
background:#022c22;
color:#4ade80;
font-weight:bold;
}

#jarvisChat{
max-height:150px;
overflow-y:auto;
padding:10px;
text-align:left;
}

.jarvisMsg{
margin:6px 0;
padding:8px;
border-radius:10px;
background:#111827;
}

.jarvisUser{
background:#1d4ed8;
}

#jarvisControls{
display:flex;
gap:10px;
padding:10px;
}

#jarvisControls button{
flex:1;
background:#22c55e;
color:black;
}

/* TOGGLE */
#toggleJarvis{
position:fixed;
bottom:160px;
right:10px;
background:#22c55e;
border:none;
padding:10px;
border-radius:50%;
z-index:10000;
cursor:pointer;
}
</style>
</head>

<body>

<header>MedAI Emergency Assistant</header>
<p>AI Injury Detection • Voice • Emergency Response</p>

<div class="buttonContainer">
<button class="voice" onclick="startVoice()">🎤 Voice</button>
<button class="scan" onclick="startScan()">📷 Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Ambulance</button>
</div>

<video id="camera" autoplay playsinline></video>

<div id="heard">Voice: Off</div>
<div id="result"></div>

<h2>First Aid Instructions</h2>
<div id="firstAid" class="firstAidContainer"></div>

<h2>Emergency Map</h2>
<div id="map"></div>

<button id="toggleJarvis" onclick="toggleJarvis()">🤖</button>

<div id="jarvis">
<div id="jarvisHeader">MedAI Assistant</div>
<div id="jarvisChat"></div>
<div id="jarvisControls">
<button onclick="jarvisScan()">Scan</button>
<button onclick="jarvisHelp()">Help</button>
</div>
</div>

<script>

/* SPEAK */
document.body.addEventListener("click",()=>{
speechSynthesis.speak(new SpeechSynthesisUtterance(""));
},{once:true});

function speak(text){
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* FIRST AID FULL */
const firstAidInstructions={
bruise:["Apply cold compress immediately","Rest the area","Elevate if possible","Avoid pressure"],
cut:["Clean with water","Apply antiseptic","Stop bleeding with pressure","Cover with bandage"],
burn:["Cool under running water","Do not apply ice","Cover with cloth","Avoid popping blisters"],
sprain:["Rest joint","Apply ice","Compress","Elevate limb"],
fracture:["Immobilize area","Do not move","Apply splint","Seek medical help"],
abrasion:["Clean wound","Apply ointment","Cover with bandage","Change dressing regularly"]
};

/* MODEL */
let model;
let modelReady=false;
const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";

async function loadModel(){
model=await tmImage.load(MODEL_URL+"model.json",MODEL_URL+"metadata.json");
modelReady=true;
}
loadModel();

/* CAMERA */
const video=document.getElementById("camera");

async function startScan(){
if(!modelReady)return alert("Model loading");

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

video.onloadeddata=()=>setTimeout(predict,1500);
}

/* PREDICT */
async function predict(){
const pred=await model.predict(video);
let best=pred.reduce((a,b)=>a.probability>b.probability?a:b);

document.getElementById("result").innerText=
best.className+" ("+(best.probability*100).toFixed(1)+"%)";

showFirstAid(best.className.toLowerCase());
speak(best.className);
addJarvisMessage("Detected: "+best.className);
}

/* FIRST AID DISPLAY */
function showFirstAid(type){
const div=document.getElementById("firstAid");
div.innerHTML="";

(firstAidInstructions[type]||["No data"]).forEach(step=>{
const card=document.createElement("div");
card.className="firstAidCard";
card.innerHTML="<b>"+type+"</b><br>"+step;
div.appendChild(card);
});
}

/* VOICE */
let recognition;
function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported");
return;
}

recognition=new webkitSpeechRecognition();
recognition.continuous=true;
recognition.start();

recognition.onresult=e=>{
let t=e.results[e.results.length-1][0].transcript.toLowerCase();
document.getElementById("heard").innerText="Heard: "+t;

if(t.includes("scan"))startScan();
if(t.includes("ambulance")||t.includes("help"))dispatchRescue();
};
}

/* MAP */
let map,userMarker;

function initMap(lat,lon){
map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

userMarker=L.marker([lat,lon]).addTo(map);

setTimeout(()=>map.invalidateSize(),500);
}

navigator.geolocation.getCurrentPosition(
pos=>initMap(pos.coords.latitude,pos.coords.longitude),
()=>initMap(28.6139,77.2090)
);

/* 🚑 FINAL AMBULANCE FIX (EMOJI + ALWAYS WORKS) */
async function dispatchRescue(){
if(!map||!userMarker)return;

speak("Ambulance on the way");
addJarvisMessage("🚑 Ambulance dispatched");

const user=userMarker.getLatLng();

/* ALWAYS VISIBLE START */
const start=[user.lat+0.005,user.lng-0.005];

/* FORCE VIEW */
map.fitBounds([start,user],{padding:[50,50]});

/* EMOJI ICON */
const ambulanceIcon=L.divIcon({
html:"<div style='font-size:32px'>🚑</div>",
iconSize:[30,30],
className:""
});

/* REMOVE OLD */
if(window.ambulanceMarker){
map.removeLayer(window.ambulanceMarker);
}

/* CREATE */
window.ambulanceMarker=L.marker(start,{icon:ambulanceIcon}).addTo(map);

/* GUARANTEED ROUTE */
let route=[
start,
[user.lat+0.003,user.lng-0.003],
[user.lat+0.001,user.lng-0.001],
[user.lat,user.lng]
];

/* MOVE */
let i=0;
const interval=setInterval(()=>{
if(i>=route.length){
clearInterval(interval);
speak("Ambulance arrived");
addJarvisMessage("✅ Arrived");
return;
}
window.ambulanceMarker.setLatLng(route[i]);
i++;
},400);
}

/* JARVIS */
function addJarvisMessage(text,user=false){
const chat=document.getElementById("jarvisChat");
const msg=document.createElement("div");
msg.className="jarvisMsg"+(user?" jarvisUser":"");
msg.innerText=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function jarvisScan(){
addJarvisMessage("Scan requested",true);
startScan();
}

function jarvisHelp(){
addJarvisMessage("Help requested",true);
dispatchRescue();
}

function toggleJarvis(){
document.getElementById("jarvis").classList.toggle("hidden");
}

window.onload=()=>{
addJarvisMessage("Hello, I am MedAI Assistant");
};

</script>

</body>
</html>
