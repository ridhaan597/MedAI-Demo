<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI Emergency Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0}

/* disclaimer */
#topDisclaimer{
background:#020617;
padding:12px;
border-bottom:2px solid #22c55e;
}

/* header */
header{font-size:28px;padding:20px}

/* buttons */
button{padding:12px 18px;margin:8px;border:none;border-radius:20px;cursor:pointer}
.voice{background:#22c55e}
.scan{background:#3b82f6}
.rescue{background:#ef4444}

/* lang */
#langToggle{
position:fixed;top:15px;right:15px;z-index:100000;
background:#22c55e;color:black;padding:8px 14px;border-radius:20px;
}

/* camera */
#cameraWrapper{position:relative}
video{width:90%;max-width:400px;border-radius:12px}
#flipBtn{
position:absolute;bottom:10px;right:10px;
background:rgba(0,0,0,0.6);color:white;border-radius:20px;padding:8px;display:none;
}

/* map */
#map{height:350px;margin-top:20px}

/* jarvis */
#jarvis{
position:fixed;bottom:0;width:100%;
background:#020617;z-index:9999;
}
#jarvis.hidden{display:none}
#toggleJarvis{
position:fixed;bottom:120px;right:10px;z-index:10000;
}

/* inactivity */
#inactiveModal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;justify-content:center;align-items:center;
z-index:99999;
}
</style>
</head>

<body>

<div id="topDisclaimer">
⚠️ MedAI is made by class 10 students. This is first aid guidance only, not medical diagnosis. Call emergency for serious injuries. Trust AI at your own risk.
</div>

<button id="langToggle">🌐 हिंदी</button>

<header>MedAI Emergency Assistant</header>

<button class="voice" onclick="startVoice()">🎤 Voice</button>
<button class="scan" onclick="startScan()">📷 Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Ambulance</button>

<div id="cameraWrapper">
<video id="camera" autoplay playsinline></video>
<button id="flipBtn">🔄 Flip</button>
</div>

<div id="heard"></div>
<div id="result"></div>
<div id="aiWarning"></div>

<h2>Map</h2>
<div id="map"></div>

<button id="toggleJarvis" onclick="toggleJarvis()">🤖</button>

<div id="jarvis" class="hidden">
<div>Assistant</div>
<button onclick="startScan()">Scan</button>
<button onclick="dispatchRescue()">Help</button>
</div>

<!-- inactivity -->
<div id="inactiveModal">
<div style="background:#020617;padding:20px;border-radius:12px;">
<h2>Need Help?</h2>
<p id="inactiveTimer">60</p>
<button id="yesHelp">Yes</button>
<button id="noHelp">No</button>
</div>
</div>

<script>

/* LANGUAGE */
let currentLang="en";
const TEXTS={
en:{title:"MedAI Emergency Assistant",yes:"Yes",no:"No",warn:"⚠️ AI can make mistakes",arrived:"Ambulance has arrived"},
hi:{title:"मेडएआई सहायक",yes:"हाँ",no:"नहीं",warn:"⚠️ AI गलती कर सकता है",arrived:"एम्बुलेंस पहुँच गई है"}
};

document.getElementById("langToggle").onclick=()=>{
currentLang=currentLang==="en"?"hi":"en";
document.querySelector("header").innerText=TEXTS[currentLang].title;
document.getElementById("yesHelp").innerText=TEXTS[currentLang].yes;
document.getElementById("noHelp").innerText=TEXTS[currentLang].no;
document.getElementById("langToggle").innerText=currentLang==="en"?"🌐 हिंदी":"🌐 English";
};

/* SPEAK */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang=currentLang==="hi"?"hi-IN":"en-US";
speechSynthesis.speak(s);
}

/* MODEL */
let model;
const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";
tmImage.load(MODEL_URL+"model.json",MODEL_URL+"metadata.json").then(m=>model=m);

/* CAMERA */
let video=document.getElementById("camera");
let facing="environment";

async function startScan(){
const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing}});
video.srcObject=stream;

if(/Mobi|Android/i.test(navigator.userAgent)){
document.getElementById("flipBtn").style.display="block";
}

setTimeout(predict,1500);
}

document.getElementById("flipBtn").onclick=()=>{
facing=facing==="environment"?"user":"environment";
startScan();
};

/* AI */
async function predict(){
const p=await model.predict(video);
let best=p[0];
for(let i=1;i<p.length;i++){
if(p[i].probability>best.probability) best=p[i];
}

document.getElementById("result").innerHTML=
best.className+" ("+(best.probability*100).toFixed(1)+"%)";

document.getElementById("aiWarning").innerText=TEXTS[currentLang].warn;

speak(best.className);
}

/* VOICE */
function startVoice(){
try{
let r=new webkitSpeechRecognition();
r.start();
r.onresult=e=>{
let t=e.results[0][0].transcript.toLowerCase();
document.getElementById("heard").innerText=t;
if(t.includes("scan")) startScan();
if(t.includes("help")||t.includes("ambulance")) dispatchRescue();
};
}catch{alert("Voice not supported");}
}

/* MAP */
let map=L.map('map').setView([28.6,77.2],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let ambulanceMarker;

function dispatchRescue(){
let route=[[28.61,77.18],[28.6,77.2]];

if(ambulanceMarker) map.removeLayer(ambulanceMarker);

ambulanceMarker=L.marker(route[0],{icon:L.divIcon({html:"🚑"})}).addTo(map);

let i=0;
let move=setInterval(()=>{
ambulanceMarker.setLatLng(route[i]);
i++;
if(i>=route.length){
clearInterval(move);
speak(TEXTS[currentLang].arrived);
}
},800);
}

/* JARVIS */
function toggleJarvis(){
document.getElementById("jarvis").classList.toggle("hidden");
}

/* INACTIVITY */
let timer,count=60;

function resetInactivity(){
clearTimeout(timer);
timer=setTimeout(showPopup,30000);
}

document.onclick=resetInactivity;
document.onmousemove=resetInactivity;

function showPopup(){
document.getElementById("inactiveModal").style.display="flex";

count=60;
let i=setInterval(()=>{
count--;
document.getElementById("inactiveTimer").innerText=count;

if(count<=0){
clearInterval(i);
dispatchRescue();
}
},1000);
}

document.getElementById("yesHelp").onclick=()=>{
dispatchRescue();
document.getElementById("inactiveModal").style.display="none";
};

document.getElementById("noHelp").onclick=()=>{
document.getElementById("inactiveModal").style.display="none";
};

resetInactivity();

</script>

</body>
</html>
