<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI Emergency Assistant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

header{
font-size:clamp(22px,5vw,32px);
padding:25px;
font-weight:bold;
}

.buttonContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
flex:1 1 30%;
min-width:120px;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

video{
width:100%;
max-width:420px;
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
font-size:18px;
color:#38bdf8;
}

#result{
margin-top:10px;
font-size:22px;
}

#status{
margin-top:10px;
color:#facc15;
}

#map{
width:100%;
height:350px;
margin:auto;
margin-top:40px;
border-radius:12px;
}

.ambulanceIcon{
font-size:70px;
}

/* FIRST AID */
.firstAidContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.firstAidCard{
position: relative;
background: linear-gradient(145deg, #16a34a, #22c55e);
border-radius:14px;
padding:20px;
width:90%;
max-width:260px;
text-align:left;
box-shadow:0 0 12px rgba(34,197,94,0.3);
overflow:hidden;
transition:0.3s;
}

.firstAidCard h4{
color:white;
margin-bottom:10px;
}

.firstAidCard p{
color:#e0f2f1;
font-size:14px;
}

.firstAidCard::before{
content:'';
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background: linear-gradient(120deg, rgba(255,255,255,0.2), rgba(255,255,255,0.5), rgba(255,255,255,0.2));
transform: skewX(-25deg);
}

.firstAidCard:hover::before,
.firstAidCard:active::before{
animation:shine 1s forwards;
}

.firstAidCard:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(34,197,94,0.7);
}

@keyframes shine{
0%{left:-75%;}
100%{left:125%;}
}

/* MOBILE FIX */
@media(max-width:500px){
button{
flex:1 1 100%;
}
#map{
height:280px;
}
}
</style>
</head>

<body>

<header>MedAI Emergency Assistant</header>

<p>Voice Activated • AI Injury Detection • Smart Rescue</p>

<div class="buttonContainer">
<button class="voice" onclick="startVoice()">🎤 Start Voice Assistant</button>
<button class="scan" onclick="startScan()">📷 Scan Injury</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Send Ambulance</button>
</div>

<br>

<div id="status">Loading AI model...</div>

<video id="camera" autoplay playsinline></video>

<div id="heard">Voice: Off</div>
<div id="result"></div>

<h2>First Aid Instructions</h2>
<div id="firstAid" class="firstAidContainer"></div>

<h2>Emergency Map</h2>
<div id="map"></div>

<script>
/* SPEAK */
function speak(text){
    const speech = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(speech);
}

/* FIRST AID */
const firstAidInstructions = {
    "bruise": ["Apply cold compress","Rest the area","Elevate if possible"],
    "cut": ["Clean wound","Apply antiseptic","Bandage it"],
    "burn": ["Cool with water","Do not use ice","Cover lightly"],
    "sprain": ["Rest","Ice","Compression","Elevation"],
    "fracture": ["Immobilize","Do not move","Seek help"],
    "abrasion": ["Clean wound","Apply ointment","Cover it"]
};

/* MODEL */
let model;
let modelReady = false;
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/0WBW0685Z/";

async function loadModel(){
    document.getElementById("status").innerText = "Loading AI model...";
    try{
        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        modelReady = true;
        document.getElementById("status").innerText = "AI Ready";
    } catch(error){
        document.getElementById("status").innerText = "Model failed to load";
    }
}
loadModel();

/* CAMERA */
let video = document.getElementById("camera");

async function startScan(){
    if(!modelReady){
        alert("AI model still loading, please wait");
        return;
    }

    if(video.srcObject){
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    video.onloadeddata = function(){
        setTimeout(predict, 1500);
    };
}

/* AI PREDICTION */
async function predict(){
    const prediction = await model.predict(video);

    let best = prediction[0];
    for(let i=1; i<prediction.length; i++){
        if(prediction[i].probability > best.probability){
            best = prediction[i];
        }
    }

    document.getElementById("result").innerHTML =
        best.className + " (" + (best.probability*100).toFixed(1) + "%)";
    
    speak(best.className + " detected");

    const firstAidDiv = document.getElementById("firstAid");
    firstAidDiv.innerHTML = "";

    if(best.probability < 0.4){
        firstAidDiv.innerHTML = "<p style='color:#facc15'>AI unsure, try again.</p>";
        return;
    }

    if(firstAidInstructions[best.className.toLowerCase()]){
        firstAidInstructions[best.className.toLowerCase()].forEach(step=>{
            const card = document.createElement("div");
            card.className = "firstAidCard";
            card.innerHTML = `<h4>${best.className}</h4><p>${step}</p>`;
            firstAidDiv.appendChild(card);
        });
    }
}

/* VOICE */
let recognition;
function startVoice(){
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.lang = "en-US";
    recognition.start();

    document.getElementById("heard").innerHTML = "Listening...";

    recognition.onresult = function(event){
        let speech = event.results[event.results.length-1][0].transcript
            .toLowerCase().trim();
        document.getElementById("heard").innerHTML = "Heard: " + speech;

        if(speech.includes("scan")){
            startScan();
        }

        if(speech.includes("help") || speech.includes("ambulance")){
            dispatchRescue();
        }
    };

    recognition.onend = function(){ recognition.start(); };
}

/* MAP */
let map;
let userMarker;
let ambulanceMarker;
let routeLine;

const ambulanceIcon = L.divIcon({
    html:'<div class="ambulanceIcon">🚑</div>',
    iconSize:[60,60],
    className:''
});

navigator.geolocation.getCurrentPosition(function(pos){
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    map = L.map('map').setView([lat,lon],15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19
    }).addTo(map);

    userMarker = L.marker([lat,lon]).addTo(map)
        .bindPopup("Patient Location")
        .openPopup();
});

/* DISPATCH */
async function dispatchRescue(){
    if(!userMarker) return;

    const user = userMarker.getLatLng();
    const startLat = user.lat + 0.02;
    const startLng = user.lng - 0.02;

    const url = `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${user.lng},${user.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();

    const coords = data.routes[0].geometry.coordinates;
    const route = coords.map(c => [c[1], c[0]]);

    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(route, {color:"red",weight:5}).addTo(map);

    ambulanceMarker = L.marker(route[0], {icon:ambulanceIcon}).addTo(map);
    moveAmbulance(route);
}

function moveAmbulance(route){
    let i = 0;
    const interval = setInterval(()=>{
        ambulanceMarker.setLatLng(route[i]);
        i++;
        if(i >= route.length){
            clearInterval(interval);
            speak("Ambulance has arrived");
        }
    },120);
}
</script>

</body>
</html>
