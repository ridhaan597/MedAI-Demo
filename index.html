<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MedAI Demo</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
font-size:36px;
padding:30px;
font-weight:bold;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

.voice{background:#22c55e;color:white;}
.scan{background:#3b82f6;color:white;}
.rescue{background:#ef4444;color:white;}

#webcam-container{
margin-top:20px;
}

#map{
width:90%;
height:420px;
margin:auto;
margin-top:40px;
border-radius:15px;
}

</style>
</head>

<body>

<header>MedAI AI Emergency Assistant</header>

<p>Voice Activated • AI Injury Detection • Smart Rescue System</p>

<button class="voice" onclick="startVoice()">🎤 Start Voice</button>
<button class="scan" onclick="startScan()">Run AI Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Send Ambulance</button>

<div id="webcam-container"></div>

<div id="result"></div>

<h2>Emergency Map</h2>

<div id="map"></div>

<script>

/* SPEECH */

function speak(text){
const speech=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(speech);
}

/* AI MODEL */

let model, webcam;

const URL="https://teachablemachine.withgoogle.com/models/L3S9i1V7D/";

async function loadModel(){

const modelURL=URL+"model.json";
const metadataURL=URL+"metadata.json";

model=await tmImage.load(modelURL,metadataURL);

}

loadModel();

/* CAMERA */

async function initCamera(){

webcam = new tmImage.Webcam(300,300,true);

await webcam.setup();
await webcam.play();

document.getElementById("webcam-container").innerHTML="";
document.getElementById("webcam-container").appendChild(webcam.canvas);

window.requestAnimationFrame(loop);

}

async function loop(){
webcam.update();
requestAnimationFrame(loop);
}

/* AI SCAN */

async function startScan(){

await initCamera();

setTimeout(predict,2000);

}

async function predict(){

if(!model) return;

const prediction=await model.predict(webcam.canvas);

let best=prediction[0];

prediction.forEach(p=>{
if(p.probability>best.probability) best=p;
});

document.getElementById("result").innerHTML=

"<h3>"+best.className+"</h3>"+
"<p>"+(best.probability*100).toFixed(1)+"%</p>";

speak("Injury detected "+best.className);

}

/* VOICE */

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice not supported");

return;

}

const recognition=new SpeechRecognition();

recognition.continuous=true;
recognition.lang="en-US";

recognition.start();

recognition.onresult=function(event){

let speech=event.results[event.results.length-1][0].transcript.toLowerCase();

console.log(speech);

if(speech.includes("med ai scan")){

speak("Starting scan");

startScan();

}

if(speech.includes("med ai help")){

speak("Ambulance dispatched");

dispatchRescue();

}

};

recognition.onend=function(){
recognition.start();
};

}

/* MAP */

let map;
let userMarker;
let ambulanceMarker;

const ambulanceIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/2967/2967350.png",
iconSize:[40,40]
});

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

map=L.map('map').setView([lat,lon],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

userMarker=L.marker([lat,lon]).addTo(map)
.bindPopup("Patient Location")
.openPopup();

});

/* RESCUE */

function dispatchRescue(){

if(!userMarker) return;

const user=userMarker.getLatLng();

const start=[user.lat+0.01,user.lng-0.01];

ambulanceMarker=L.marker(start,{icon:ambulanceIcon}).addTo(map);

moveAmbulance(start,user);

}

function moveAmbulance(start,end){

let lat=start[0];
let lng=start[1];

const interval=setInterval(()=>{

lat+=(end.lat-lat)*0.15;
lng+=(end.lng-lng)*0.15;

ambulanceMarker.setLatLng([lat,lng]);

if(Math.abs(lat-end.lat)<0.0001){

clearInterval(interval);

speak("Ambulance has arrived");

}

},500);

}

</script>

</body>
</html>
