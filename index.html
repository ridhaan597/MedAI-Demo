<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedAI Emergency Assistant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.6.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:10px;
}

header{
font-size:clamp(22px,5vw,32px);
padding:25px;
font-weight:bold;
}

/* BUTTONS */
.buttonContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
flex:1 1 30%;
min-width:120px;
}

.voice{background:#22c55e;}
.scan{background:#3b82f6;}
.rescue{background:#ef4444;}

video{
width:100%;
max-width:420px;
margin-top:20px;
border-radius:12px;
}

#heard{
margin-top:15px;
font-size:18px;
color:#38bdf8;
}

#result{
margin-top:10px;
font-size:22px;
}

#status{
margin-top:10px;
color:#facc15;
}

/* MAP */
#map{
width:100%;
height:350px;
margin:auto;
margin-top:40px;
border-radius:12px;
}

.ambulanceIcon{
font-size:70px;
}

/* FIRST AID CARDS */
.firstAidContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.firstAidCard{
position: relative;
background: linear-gradient(145deg, #16a34a, #22c55e);
border-radius:14px;
padding:20px;
width:90%;
max-width:260px;
text-align:left;
box-shadow:0 0 12px rgba(34,197,94,0.3);
overflow:hidden;
transition:0.3s;
}

.firstAidCard h4{
color:white;
margin-bottom:10px;
}

.firstAidCard p{
color:#e0f2f1;
font-size:14px;
}

.firstAidCard::before{
content:'';
position:absolute;
top:0;
left:-75%;
width:50%;
height:100%;
background: linear-gradient(120deg, rgba(255,255,255,0.2), rgba(255,255,255,0.5), rgba(255,255,255,0.2));
transform: skewX(-25deg);
}

.firstAidCard:hover::before,
.firstAidCard:active::before{
animation:shine 1s forwards;
}

.firstAidCard:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(34,197,94,0.7);
}

@keyframes shine{
0%{left:-75%;}
100%{left:125%;}
}

/* MOBILE */
@media(max-width:500px){
button{
flex:1 1 100%;
}
#map{
height:280px;
}
}

/* JARVIS */
#jarvis{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
border-top:2px solid #22c55e;
z-index:999;
}

#jarvisHeader{
padding:10px;
background:#022c22;
color:#4ade80;
font-weight:bold;
}

#jarvisChat{
max-height:180px;
overflow-y:auto;
padding:10px;
text-align:left;
}

.jarvisMsg{
margin:6px 0;
padding:8px;
border-radius:10px;
background:#111827;
}

.jarvisUser{
background:#1d4ed8;
}

#jarvisControls{
display:flex;
gap:10px;
padding:10px;
}

#jarvisControls button{
flex:1;
background:#22c55e;
color:black;
border-radius:10px;
}
</style>
</head>

<body>

<header>MedAI Emergency Assistant</header>
<p>Voice Activated • AI Injury Detection • Smart Rescue</p>

<div class="buttonContainer">
<button class="voice" onclick="startVoice()">🎤 Voice</button>
<button class="scan" onclick="startScan()">📷 Scan</button>
<button class="rescue" onclick="dispatchRescue()">🚑 Ambulance</button>
</div>

<div id="status">Loading AI...</div>
<video id="camera" autoplay playsinline></video>
<div id="heard">Voice: Off</div>
<div id="result"></div>

<h2>First Aid</h2>
<div id="firstAid" class="firstAidContainer"></div>

<h2>Map</h2>
<div id="map"></div>

<!-- JARVIS -->
<div id="jarvis">
<div id="jarvisHeader">🤖 MedAI Assistant</div>
<div id="jarvisChat"></div>
<div id="jarvisControls">
<button onclick="jarvisScan()">📷 Scan</button>
<button onclick="jarvisHelp()">🚑 Help</button>
</div>
</div>

<script>

/* SPEECH UNLOCK */
document.body.addEventListener("click",()=>{
speechSynthesis.speak(new SpeechSynthesisUtterance(""));
},{once:true});

function speak(text){
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* FIRST AID */
const firstAidInstructions={
bruise:["Apply ice","Rest"],
cut:["Clean","Bandage"],
burn:["Cool water","Cover"],
abrasion:["Clean","Ointment","Cover"]
};

/* MODEL */
let model;
let modelReady=false;
const MODEL_URL="https://teachablemachine.withgoogle.com/models/0WBW0685Z/";

async function loadModel(){
try{
model=await tmImage.load(MODEL_URL+"model.json",MODEL_URL+"metadata.json");
modelReady=true;
document.getElementById("status").innerText="AI Ready";
}catch{
document.getElementById("status").innerText="Model failed";
}
}
loadModel();

/* CAMERA */
const video=document.getElementById("camera");

async function startScan(){
if(!modelReady)return alert("Model loading");

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

video.onloadeddata=()=>setTimeout(predict,1500);
}

/* PREDICT */
async function predict(){
const pred=await model.predict(video);
let best=pred.reduce((a,b)=>a.probability>b.probability?a:b);

document.getElementById("result").innerText=best.className;
speak(best.className);

showFirstAid(best.className.toLowerCase());
addJarvisMessage("Detected: "+best.className);
}

function showFirstAid(type){
const div=document.getElementById("firstAid");
div.innerHTML="";
(firstAidInstructions[type]||["No data"]).forEach(step=>{
const el=document.createElement("div");
el.className="firstAidCard";
el.innerHTML="<p>"+step+"</p>";
div.appendChild(el);
});
}

/* VOICE (UNCHANGED CORE) */
let recognition;
function startVoice(){
if(!('webkitSpeechRecognition' in window)){
alert("Voice not supported on mobile");
return;
}

recognition=new webkitSpeechRecognition();
recognition.continuous=true;
recognition.start();

recognition.onresult=(e)=>{
let t=e.results[e.results.length-1][0].transcript.toLowerCase();
addJarvisMessage(t,true);

if(t.includes("scan")) startScan();
if(t.includes("ambulance")) dispatchRescue();
};
}

/* MAP */
let map,userMarker;

function initMap(lat,lon){
map=L.map('map').setView([lat,lon],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
userMarker=L.marker([lat,lon]).addTo(map);
}

navigator.geolocation.getCurrentPosition(
pos=>initMap(pos.coords.latitude,pos.coords.longitude),
()=>initMap(28.6139,77.2090)
);

/* AMBULANCE */
function dispatchRescue(){
if(!map)return;
speak("Ambulance coming");
addJarvisMessage("Ambulance dispatched");
}

/* JARVIS */
function addJarvisMessage(text,user=false){
const chat=document.getElementById("jarvisChat");
const msg=document.createElement("div");
msg.className="jarvisMsg"+(user?" jarvisUser":"");
msg.innerText=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function jarvisScan(){
addJarvisMessage("Scan requested",true);
startScan();
}

function jarvisHelp(){
addJarvisMessage("Help requested",true);
dispatchRescue();
}

window.onload=()=>{
setTimeout(()=>{
addJarvisMessage("Hello, I am MedAI Assistant");
addJarvisMessage("Use Scan or Help");
},1000);
};

</script>

</body>
</html>
